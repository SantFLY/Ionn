<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Galería de Fotos</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Galería de Fotos</ion-title>
    </ion-toolbar>
  </ion-header>

  <div class="galeria-container ion-padding">
    <p *ngIf="usuario" class="bienvenida">Hola, {{ usuario }}</p>

    <ion-fab slot="fixed" vertical="bottom" horizontal="end">
      <ion-fab-button (click)="tomarFoto()">
        <ion-icon name="camera"></ion-icon>
      </ion-fab-button>
    </ion-fab>

    <ion-grid>
      <ion-row>
        <ion-col size="6" *ngFor="let foto of fotos">
          <ion-card class="foto-card">
            <img [src]="getFotoPath(foto)" [alt]="foto.id" />
            <ion-card-content>
              <p class="fecha">{{ formatearFecha(foto.fecha) }}</p>
              <ion-button
                fill="clear"
                color="danger"
                size="small"
                (click)="eliminarFoto(foto.id)"
              >
                <ion-icon name="trash-outline"></ion-icon>
              </ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>

    <ion-button expand="block" fill="outline" (click)="seleccionarDeGaleria()">
      <ion-icon name="images-outline"></ion-icon>
      Seleccionar de galería
    </ion-button>

    <p *ngIf="fotos.length === 0" class="sin-fotos">
      No hay fotos aún. Toca el botón de cámara para capturar una foto.
    </p>
  </div>
</ion-content>
